# render.yaml — Render Infrastructure-as-Code
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─── Django Backend ────────────────────────────────────────────────────
  - type: web
    name: taskflow-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "taskflow-backend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: taskflow-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://taskflow-frontend.onrender.com"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp-relay.brevo.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "TaskFlow <noreply@taskflow.app>"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

  # ─── React Frontend ────────────────────────────────────────────────────
  - type: web
    name: taskflow-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://taskflow-backend.onrender.com/api"
        isDockerBuildArg: true
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
        isDockerBuildArg: true
      - key: VITE_GITHUB_CLIENT_ID
        sync: false
        isDockerBuildArg: true

  # ─── Redis ────────────────────────────────────────────────────────────
  - type: redis
    name: taskflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render internal only)

databases:
  # ─── PostgreSQL ───────────────────────────────────────────────────────
  - name: taskflow-db
    plan: free
    databaseName: taskflow_db
    user: taskflow_user
